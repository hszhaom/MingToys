# 站点基础信息
title: PetStorie
description: Pet Stories & Dog Breed Guides
author: PetStorie

# 域名配置（独立域名核心）
url: "https://petstorie.com"
baseurl: ""

# 文章配置
permalink: /posts/:year/:month/:day/:title/
paginate: 8
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false

exclude:
  - README.md