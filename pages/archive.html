---
layout: default
title: All Stories
---

<header>
  <div class="header-container">
    <div class="logo">
      <a href="{{ site.baseurl }}/">{{ site.title }}</a>
    </div>
    <div class="nav">
      <a href="{{ site.baseurl }}/">Home</a>
      <a href="{{ site.baseurl }}/archive">Archive</a>
    </div>
  </div>
</header>

<div class="container">
  <h2 style="margin-bottom: 2rem;">All Pet Stories</h2>
  <ul style="list-style: none;">
    {% for post in site.posts %}
    <li style="margin: 1rem 0; padding-bottom: 1rem; border-bottom: 1px solid #eee;">
      <span style="color:#999;">{{ post.date | date: "%Y-%m-%d" }}</span>
      <a href="{{ post.url }}" style="margin-left: 1rem; font-size: 1.1rem; color:#e63946; text-decoration:none;">
        {{ post.title }}
      </a>
    </li>
    {% endfor %}
  </ul>
</div>

<footer>
  &copy; {{ site.time | date: '%Y' }} {{ site.title }} | Powered by GitHub Pages & Jekyll
</footer>
